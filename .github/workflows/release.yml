name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Cross-compile binaries ───────────────────────────────────
  build-release:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools (x86_64-linux-musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Configure linker (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p shift-preflight-cli

      - name: Archive
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../shift-ai-${{ matrix.target }}.tar.gz shift-ai

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shift-ai-${{ matrix.target }}
          path: shift-ai-${{ matrix.target }}.tar.gz

  # ── Upload binaries + checksums to GitHub Release ────────────
  publish-release:
    needs: [release-please, build-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum shift-ai-*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "${TAG_NAME}" \
            artifacts/shift-ai-*.tar.gz \
            artifacts/checksums.txt \
            --clobber

      - name: Update latest tag
        run: |
          git tag -f latest
          git push -f origin latest

  # ── Publish to crates.io ─────────────────────────────────────
  publish-crates:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish shift-preflight (library)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p shift-preflight --quiet

      - name: Publish shift-proxy (with retry)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for attempt in 1 2 3 4 5; do
            if cargo publish -p shift-proxy --quiet; then
              echo "Published shift-proxy"
              exit 0
            fi
            echo "Attempt ${attempt} failed — crates.io index may not have propagated yet. Waiting 30s..."
            sleep 30
          done
          echo "Failed to publish shift-proxy after 5 attempts" >&2
          exit 1

      - name: Publish shift-preflight-cli (binary, with retry)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for attempt in 1 2 3 4 5; do
            if cargo publish -p shift-preflight-cli --quiet; then
              echo "Published shift-preflight-cli"
              exit 0
            fi
            echo "Attempt ${attempt} failed — crates.io index may not have propagated yet. Waiting 30s..."
            sleep 30
          done
          echo "Failed to publish shift-preflight-cli after 5 attempts" >&2
          exit 1

  # ── Publish to npm ────────────────────────────────────────────
  publish-npm:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions: {}
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: runtime/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Publish @shift-preflight/runtime
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Publish OpenCode plugin to npm ─────────────────────────
  publish-opencode-plugin:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions: {}
    defaults:
      run:
        working-directory: opencode-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: bun install
      - run: bun run typecheck
      - run: bun run build
      - run: bun test

      - name: Publish @shift-preflight/opencode-plugin
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Update Homebrew formula ──────────────────────────────────
  update-homebrew:
    needs: [release-please, publish-release]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          # Validate inputs
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION" >&2
            exit 1
          fi
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag: $TAG" >&2
            exit 1
          fi

          TARBALL_URL="https://github.com/alohaninja/shift/archive/refs/tags/${TAG}.tar.gz"

          # Download source tarball to a file and compute SHA256
          curl -fSL "${TARBALL_URL}" -o /tmp/source.tar.gz
          SHA256=$(sha256sum /tmp/source.tar.gz | cut -d' ' -f1)

          if ! [[ "$SHA256" =~ ^[a-f0-9]{64}$ ]]; then
            echo "Invalid SHA256: $SHA256" >&2
            exit 1
          fi

          # Generate the formula (heredoc must not be indented)
          cat > /tmp/shift-ai.rb <<RUBY
          class ShiftAi < Formula
            desc "Multimodal preflight layer that transforms images before they reach AI model APIs"
            homepage "https://github.com/alohaninja/shift"
            license "Apache-2.0"
            head "https://github.com/alohaninja/shift.git", branch: "main"

            url "${TARBALL_URL}"
            sha256 "${SHA256}"
            version "${VERSION}"

            depends_on "rust" => :build

            def install
              system "cargo", "install", *std_cargo_args(path: "shift-cli")
            end

            test do
              assert_match "shift-ai", shell_output("#{bin}/shift-ai --version")
            end
          end
          RUBY

          # Push to the homebrew tap repo via GitHub API
          CONTENT=$(base64 -w 0 /tmp/shift-ai.rb)

          # Get current file SHA (for update, not create)
          CURRENT_SHA=$(gh api repos/alohaninja/homebrew-shift/contents/Formula/shift-ai.rb \
            --jq '.sha' 2>/dev/null || echo "")

          if [ -n "$CURRENT_SHA" ]; then
            gh api repos/alohaninja/homebrew-shift/contents/Formula/shift-ai.rb \
              --method PUT \
              -f message="Update shift-ai to ${VERSION}" \
              -f content="${CONTENT}" \
              -f sha="${CURRENT_SHA}"
          else
            gh api repos/alohaninja/homebrew-shift/contents/Formula/shift-ai.rb \
              --method PUT \
              -f message="Add shift-ai ${VERSION}" \
              -f content="${CONTENT}"
          fi

          echo "Updated Homebrew formula to ${VERSION}"
