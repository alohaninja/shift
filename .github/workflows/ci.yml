name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # ── Format ──────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ── Lint ────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Test ────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace 2>&1 | tee test-output.txt
      - name: Summarize test results
        if: always()
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep "^test result:" test-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── Build (multi-platform) ─────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --workspace
      - name: Binary size
        run: |
          ls -lh target/release/shift-ai
          SIZE=$(stat -f%z target/release/shift-ai 2>/dev/null || stat -c%s target/release/shift-ai)
          echo "### Binary size (${{ matrix.os }})" >> $GITHUB_STEP_SUMMARY
          echo "shift-ai: $(echo $SIZE | awk '{printf "%.1f MB", $1/1048576}')" >> $GITHUB_STEP_SUMMARY

  # ── Runtime (TypeScript) ──────────────────────────────────
  runtime:
    name: Runtime
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: runtime/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Run tests
        run: npm test 2>&1 | tee test-output.txt
      - name: Summarize test results
        if: always()
        run: |
          echo "### Runtime Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -5 test-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── OpenCode Plugin (TypeScript/Bun) ────────────────────────
  opencode-plugin:
    name: OpenCode Plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opencode-plugin
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck
      - run: bun run build
      - name: Run tests
        run: bun test 2>&1 | tee test-output.txt
      - name: Summarize test results
        if: always()
        run: |
          echo "### OpenCode Plugin Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -5 test-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── Security audit ─────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    # Don't block PRs on advisory-db lag, just warn
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - run: cargo audit

  # ── Gate ────────────────────────────────────────────────────
  # Single status check that branch protection can require
  ci-pass:
    name: CI Pass
    if: always()
    needs: [fmt, clippy, test, build, runtime, opencode-plugin]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "fmt:             ${{ needs.fmt.result }}"
          echo "clippy:          ${{ needs.clippy.result }}"
          echo "test:            ${{ needs.test.result }}"
          echo "build:           ${{ needs.build.result }}"
          echo "runtime:         ${{ needs.runtime.result }}"
          echo "opencode-plugin: ${{ needs.opencode-plugin.result }}"
          if [[ "${{ needs.fmt.result }}" != "success" ]] || \
             [[ "${{ needs.clippy.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.runtime.result }}" != "success" ]] || \
             [[ "${{ needs.opencode-plugin.result }}" != "success" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
