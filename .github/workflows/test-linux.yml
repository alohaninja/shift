name: Linux Distro Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-ubuntu:
    name: Test on Ubuntu 22.04
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Ubuntu test image
        run: |
          docker build \
            -f tests/docker/Dockerfile.ubuntu \
            -t shift-test-ubuntu \
            .

      - name: Run tests
        run: |
          docker run --rm shift-test-ubuntu

      - name: Show logs on failure
        if: failure()
        run: |
          echo "Ubuntu tests failed — see logs above"

  test-arch:
    name: Test on Arch Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Arch test image
        run: |
          docker build \
            -f tests/docker/Dockerfile.arch \
            -t shift-test-arch \
            .

      - name: Run tests
        run: |
          docker run --rm shift-test-arch

      - name: Show logs on failure
        if: failure()
        run: |
          echo "Arch Linux tests failed — see logs above"

  test-summary:
    name: Linux Tests Summary
    runs-on: ubuntu-latest
    needs: [test-ubuntu, test-arch]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Ubuntu: ${{ needs.test-ubuntu.result }}"
          echo "Arch:   ${{ needs.test-arch.result }}"

          if [ "${{ needs.test-ubuntu.result }}" != "success" ] || \
             [ "${{ needs.test-arch.result }}" != "success" ]; then
            echo "::error::One or more Linux distro tests failed"
            exit 1
          fi

          echo "All Linux distro tests passed"
