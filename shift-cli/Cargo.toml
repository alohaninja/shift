[package]
name = "shift-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "CLI for SHIFT multimodal preflight layer"

[[bin]]
name = "shift"
path = "src/main.rs"

[dependencies]
shift-core = { path = "../shift-core" }
clap = { version = "4", features = ["derive"] }
serde_json = "1"
anyhow = "1"
atty = "0.2"
