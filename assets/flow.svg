<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="'SF Mono','Fira Code','Cascadia Code',monospace">
  <defs>
    <!-- Dark gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0f1a"/>
      <stop offset="100%" stop-color="#141828"/>
    </linearGradient>

    <!-- Cyan-to-purple gradient (matches icon S-curve) -->
    <linearGradient id="shift-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Glow filter for the SHIFT box -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle card shadow -->
    <filter id="card-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#00d4ff"/>
    </marker>
    <marker id="arrow-dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#4a5568"/>
    </marker>

    <!-- Animated dash for flowing data -->
    <style>
      @keyframes flow {
        to { stroke-dashoffset: -24; }
      }
      .flow-line {
        stroke-dasharray: 8 4;
        animation: flow 1s linear infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      .pulse { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1100" height="520" rx="16" fill="url(#bg)"/>

  <!-- Title bar -->
  <text x="550" y="38" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600" letter-spacing="3" opacity="0.6">SHIFT PIPELINE</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- COLUMN 1: CLIENT                                        -->
  <!-- ════════════════════════════════════════════════════════ -->
  <g transform="translate(70, 80)">
    <!-- Card -->
    <rect width="160" height="200" rx="12" fill="#1a1e2e" stroke="#2d3348" stroke-width="1" filter="url(#card-shadow)"/>
    <text x="80" y="28" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="2">CLIENT</text>
    <line x1="20" y1="38" x2="140" y2="38" stroke="#2d3348" stroke-width="1"/>

    <!-- Payload items -->
    <!-- Oversized image icon -->
    <rect x="20" y="52" width="50" height="38" rx="4" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="45" y="68" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="700">4000</text>
    <text x="45" y="80" text-anchor="middle" fill="#ef4444" font-size="7">x3000</text>

    <!-- SVG icon -->
    <rect x="80" y="52" width="50" height="38" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="105" y="72" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="700">.svg</text>

    <!-- BMP icon -->
    <rect x="20" y="100" width="50" height="38" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="45" y="120" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="700">.bmp</text>

    <!-- Good small image -->
    <rect x="80" y="100" width="50" height="38" rx="4" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
    <text x="105" y="116" text-anchor="middle" fill="#22c55e" font-size="8" font-weight="700">640</text>
    <text x="105" y="128" text-anchor="middle" fill="#22c55e" font-size="7">x480</text>

    <!-- Legend -->
    <g transform="translate(20, 152)">
      <circle cx="5" cy="5" r="3" fill="#ef4444"/>
      <text x="14" y="8" fill="#94a3b8" font-size="8">violation</text>
      <circle cx="5" cy="20" r="3" fill="#f59e0b"/>
      <text x="14" y="23" fill="#94a3b8" font-size="8">unsupported</text>
      <circle cx="5" cy="35" r="3" fill="#22c55e"/>
      <text x="14" y="38" fill="#94a3b8" font-size="8">valid</text>
    </g>
  </g>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- ARROW: Client -> SHIFT                                  -->
  <!-- ════════════════════════════════════════════════════════ -->
  <line x1="240" y1="180" x2="300" y2="180" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow)" class="flow-line"/>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- COLUMN 2: SHIFT CORE (3-stage pipeline)                 -->
  <!-- ════════════════════════════════════════════════════════ -->
  <g transform="translate(310, 60)">
    <!-- Outer container with gradient border -->
    <rect width="400" height="400" rx="16" fill="none" stroke="url(#shift-grad)" stroke-width="2" filter="url(#glow)" opacity="0.4"/>
    <rect width="400" height="400" rx="16" fill="#12152266"/>

    <!-- SHIFT header -->
    <text x="200" y="32" text-anchor="middle" fill="url(#shift-grad)" font-size="16" font-weight="700" letter-spacing="4">SHIFT</text>

    <!-- ── Stage 1: INSPECT ── -->
    <g transform="translate(20, 50)">
      <rect width="360" height="90" rx="10" fill="#1a1e2e" stroke="#00d4ff" stroke-width="1" opacity="0.9"/>
      <circle cx="30" cy="20" r="10" fill="#00d4ff" opacity="0.15"/>
      <text x="30" y="24" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="700">1</text>
      <text x="52" y="24" fill="#00d4ff" font-size="12" font-weight="700">INSPECT</text>

      <text x="30" y="44" fill="#94a3b8" font-size="9">detect format</text>
      <text x="30" y="56" fill="#94a3b8" font-size="9">read dimensions</text>
      <text x="30" y="68" fill="#94a3b8" font-size="9">measure file size</text>
      <text x="30" y="80" fill="#94a3b8" font-size="9">decode base64 / fetch URL</text>

      <!-- Format badges -->
      <g transform="translate(210, 38)">
        <rect width="32" height="16" rx="3" fill="#00d4ff" opacity="0.15"/>
        <text x="16" y="12" text-anchor="middle" fill="#00d4ff" font-size="8" font-weight="600">PNG</text>
      </g>
      <g transform="translate(248, 38)">
        <rect width="32" height="16" rx="3" fill="#00d4ff" opacity="0.15"/>
        <text x="16" y="12" text-anchor="middle" fill="#00d4ff" font-size="8" font-weight="600">JPG</text>
      </g>
      <g transform="translate(286, 38)">
        <rect width="32" height="16" rx="3" fill="#00d4ff" opacity="0.15"/>
        <text x="16" y="12" text-anchor="middle" fill="#00d4ff" font-size="8" font-weight="600">SVG</text>
      </g>
      <g transform="translate(324, 38)">
        <rect width="28" height="16" rx="3" fill="#00d4ff" opacity="0.15"/>
        <text x="14" y="12" text-anchor="middle" fill="#00d4ff" font-size="8" font-weight="600">GIF</text>
      </g>
      <g transform="translate(210, 60)">
        <rect width="38" height="16" rx="3" fill="#00d4ff" opacity="0.15"/>
        <text x="19" y="12" text-anchor="middle" fill="#00d4ff" font-size="8" font-weight="600">WebP</text>
      </g>
      <g transform="translate(254, 60)">
        <rect width="32" height="16" rx="3" fill="#00d4ff" opacity="0.15"/>
        <text x="16" y="12" text-anchor="middle" fill="#00d4ff" font-size="8" font-weight="600">BMP</text>
      </g>
      <g transform="translate(292, 60)">
        <rect width="38" height="16" rx="3" fill="#00d4ff" opacity="0.15"/>
        <text x="19" y="12" text-anchor="middle" fill="#00d4ff" font-size="8" font-weight="600">TIFF</text>
      </g>
    </g>

    <!-- Down arrow -->
    <line x1="200" y1="145" x2="200" y2="165" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow-dim)"/>

    <!-- ── Stage 2: POLICY ── -->
    <g transform="translate(20, 170)">
      <rect width="360" height="90" rx="10" fill="#1a1e2e" stroke="#7c3aed" stroke-width="1" opacity="0.9"/>
      <circle cx="30" cy="20" r="10" fill="#7c3aed" opacity="0.15"/>
      <text x="30" y="24" text-anchor="middle" fill="#a855f7" font-size="12" font-weight="700">2</text>
      <text x="52" y="24" fill="#a855f7" font-size="12" font-weight="700">POLICY</text>

      <text x="30" y="44" fill="#94a3b8" font-size="9">load provider profile</text>
      <text x="30" y="56" fill="#94a3b8" font-size="9">evaluate constraints</text>
      <text x="30" y="68" fill="#94a3b8" font-size="9">apply drive mode rules</text>
      <text x="30" y="80" fill="#94a3b8" font-size="9">determine actions</text>

      <!-- Mode badges -->
      <g transform="translate(200, 38)">
        <rect width="46" height="16" rx="3" fill="#22c55e" opacity="0.15"/>
        <text x="23" y="12" text-anchor="middle" fill="#22c55e" font-size="8" font-weight="600">PERF</text>
      </g>
      <g transform="translate(252, 38)">
        <rect width="56" height="16" rx="3" fill="#3b82f6" opacity="0.2"/>
        <text x="28" y="12" text-anchor="middle" fill="#60a5fa" font-size="8" font-weight="600">BALANCED</text>
      </g>
      <g transform="translate(314, 38)">
        <rect width="38" height="16" rx="3" fill="#f59e0b" opacity="0.15"/>
        <text x="19" y="12" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="600">ECO</text>
      </g>

      <!-- Provider badges -->
      <g transform="translate(200, 62)">
        <rect width="52" height="16" rx="3" fill="#1e293b" stroke="#4a5568" stroke-width="0.5"/>
        <text x="26" y="12" text-anchor="middle" fill="#e2e8f0" font-size="8">OpenAI</text>
      </g>
      <g transform="translate(260, 62)">
        <rect width="64" height="16" rx="3" fill="#1e293b" stroke="#4a5568" stroke-width="0.5"/>
        <text x="32" y="12" text-anchor="middle" fill="#e2e8f0" font-size="8">Anthropic</text>
      </g>
    </g>

    <!-- Down arrow -->
    <line x1="200" y1="265" x2="200" y2="285" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow-dim)"/>

    <!-- ── Stage 3: TRANSFORM ── -->
    <g transform="translate(20, 290)">
      <rect width="360" height="90" rx="10" fill="#1a1e2e" stroke="#ec4899" stroke-width="1" opacity="0.9"/>
      <circle cx="30" cy="20" r="10" fill="#ec4899" opacity="0.15"/>
      <text x="30" y="24" text-anchor="middle" fill="#ec4899" font-size="12" font-weight="700">3</text>
      <text x="52" y="24" fill="#ec4899" font-size="12" font-weight="700">TRANSFORM</text>

      <text x="30" y="44" fill="#94a3b8" font-size="9">resize (Lanczos3)</text>
      <text x="30" y="56" fill="#94a3b8" font-size="9">recompress JPEG</text>
      <text x="30" y="68" fill="#94a3b8" font-size="9">rasterize SVG → PNG</text>
      <text x="30" y="80" fill="#94a3b8" font-size="9">convert BMP/TIFF → PNG</text>

      <!-- Action icons -->
      <g transform="translate(210, 36)">
        <rect width="54" height="16" rx="3" fill="#ec4899" opacity="0.12"/>
        <text x="27" y="12" text-anchor="middle" fill="#ec4899" font-size="8" font-weight="600">RESIZE</text>
      </g>
      <g transform="translate(270, 36)">
        <rect width="72" height="16" rx="3" fill="#ec4899" opacity="0.12"/>
        <text x="36" y="12" text-anchor="middle" fill="#ec4899" font-size="8" font-weight="600">RECOMPRESS</text>
      </g>
      <g transform="translate(210, 58)">
        <rect width="68" height="16" rx="3" fill="#ec4899" opacity="0.12"/>
        <text x="34" y="12" text-anchor="middle" fill="#ec4899" font-size="8" font-weight="600">RASTERIZE</text>
      </g>
      <g transform="translate(284, 58)">
        <rect width="60" height="16" rx="3" fill="#ec4899" opacity="0.12"/>
        <text x="30" y="12" text-anchor="middle" fill="#ec4899" font-size="8" font-weight="600">CONVERT</text>
      </g>
    </g>
  </g>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- ARROW: SHIFT -> Model API                               -->
  <!-- ════════════════════════════════════════════════════════ -->
  <line x1="720" y1="180" x2="780" y2="180" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow)" class="flow-line"/>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- COLUMN 3: MODEL API                                     -->
  <!-- ════════════════════════════════════════════════════════ -->
  <g transform="translate(790, 80)">
    <rect width="230" height="200" rx="12" fill="#1a1e2e" stroke="#2d3348" stroke-width="1" filter="url(#card-shadow)"/>
    <text x="115" y="28" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="2">MODEL API</text>
    <line x1="20" y1="38" x2="210" y2="38" stroke="#2d3348" stroke-width="1"/>

    <!-- All-green output items -->
    <rect x="20" y="52" width="50" height="38" rx="4" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
    <text x="45" y="68" text-anchor="middle" fill="#22c55e" font-size="8" font-weight="700">2048</text>
    <text x="45" y="80" text-anchor="middle" fill="#22c55e" font-size="7">x1536</text>

    <rect x="80" y="52" width="50" height="38" rx="4" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
    <text x="105" y="72" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="700">.png</text>

    <rect x="140" y="52" width="50" height="38" rx="4" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
    <text x="165" y="72" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="700">.png</text>

    <rect x="20" y="100" width="50" height="38" rx="4" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
    <text x="45" y="116" text-anchor="middle" fill="#22c55e" font-size="8" font-weight="700">640</text>
    <text x="45" y="128" text-anchor="middle" fill="#22c55e" font-size="7">x480</text>

    <!-- Status -->
    <g transform="translate(20, 155)">
      <rect width="190" height="28" rx="6" fill="#22c55e" opacity="0.1"/>
      <text x="95" y="19" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">ALL CONSTRAINTS MET</text>
    </g>
  </g>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- BOTTOM: Report bar                                      -->
  <!-- ════════════════════════════════════════════════════════ -->
  <g transform="translate(70, 475)">
    <rect width="950" height="32" rx="6" fill="#1a1e2e" stroke="#2d3348" stroke-width="1"/>
    <text x="16" y="21" fill="#64748b" font-size="10" font-weight="600">REPORT</text>
    <text x="90" y="21" fill="#94a3b8" font-size="10">images: 4</text>
    <text x="190" y="21" fill="#94a3b8" font-size="10">modified: 3</text>
    <text x="310" y="21" fill="#94a3b8" font-size="10">resized: 1</text>
    <text x="420" y="21" fill="#94a3b8" font-size="10">rasterized: 1</text>
    <text x="550" y="21" fill="#94a3b8" font-size="10">converted: 1</text>
    <text x="680" y="21" fill="#94a3b8" font-size="10">passed: 1</text>
    <text x="785" y="21" fill="#22c55e" font-size="10" font-weight="600">size reduction: 62%</text>
  </g>
</svg>
